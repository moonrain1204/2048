<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2K48 Pro - 5x5</title>
    <style>
        :root {
            --bg-color: #bbada0;
            --tile-bg: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background-color: #faf8ef;
            font-family: "Clear Sans", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            width: 90%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .score-container {
            background: var(--bg-color);
            padding: 5px 20px;
            border-radius: 6px;
            color: white;
            text-align: center;
        }

        .score-value { font-size: 24px; font-weight: bold; display: block; }

        .game-container {
            width: 90vw;
            height: 90vw;
            max-width: 450px;
            max-height: 450px;
            background-color: var(--bg-color);
            border-radius: 6px;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .grid-cell { background: var(--tile-bg); border-radius: 4px; }

        .tile-container {
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
        }

        .tile {
            position: absolute;
            width: calc((100% - 40px) / 5);
            height: calc((100% - 40px) / 5);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            transition: transform 100ms ease-in-out;
            will-change: transform;
            z-index: 10;
        }

        .tile-new {
            animation: appear 150ms ease-out;
        }

        @keyframes appear { 
            0% { opacity: 0; transform: scale(0); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        .tile-2 { background: #eee4da; color: var(--text-dark); }
        .tile-4 { background: #ede0c8; color: var(--text-dark); }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: 20px; }
        .tile-256 { background: #edcc61; color: white; font-size: 20px; }
        .tile-512 { background: #edc850; color: white; font-size: 20px; }
        .tile-1024 { background: #edc53f; color: white; font-size: 16px; }
        .tile-2048 { background: #edc22e; color: white; font-size: 16px; }
        .tile-super { background: #3c3a32; color: white; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--text-dark); margin: 0;">2K48</h2>
        <div class="score-container">
            <div style="font-size: 12px;">SCORE</div>
            <div id="score" class="score-value">0</div>
        </div>
    </div>

    <div class="game-container">
        <div class="grid-container" id="grid-bg"></div>
        <div class="tile-container" id="tile-container"></div>
    </div>

    <p style="color: var(--text-dark); margin-top: 15px;">流暢版 5x5 - 滑動合併！</p>

    <script>
        const GRID_SIZE = 5;
        let grid = [];
        let score = 0;
        const container = document.getElementById('tile-container');
        const scoreDisplay = document.getElementById('score');

        function init() {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            document.getElementById('grid-bg').innerHTML = '<div class="grid-cell"></div>'.repeat(25);
            addTile(); addTile();
            render();
        }

        function addTile() {
            let empty = [];
            for(let r=0; r<GRID_SIZE; r++)
                for(let c=0; c<GRID_SIZE; c++)
                    if(grid[r][c] === 0) empty.push({r,c});
            if(empty.length) {
                let {r,c} = empty[Math.floor(Math.random()*empty.length)];
                grid[r][c] = { value: Math.random() < 0.9 ? 2 : 4, isNew: true };
            }
        }

        function render() {
            const currentTiles = container.querySelectorAll('.tile');
            const newGridMap = new Map();

            // 1. 準備新的位置圖
            grid.forEach((row, r) => {
                row.forEach((cell, c) => {
                    if (cell) {
                        const val = cell.value;
                        const div = document.createElement('div');
                        div.className = `tile tile-${val > 2048 ? 'super' : val}`;
                        if (cell.isNew) div.classList.add('tile-new');
                        div.textContent = val;
                        div.style.transform = `translate(calc(${c} * 100% + ${c * 10}px), calc(${r} * 100% + ${r * 10}px))`;
                        newGridMap.set(`${r}-${c}`, div);
                        cell.isNew = false; // 清除新方塊標記
                    }
                });
            });

            // 2. 使用 RequestAnimationFrame 確保在瀏覽器繪製前更新，防止閃爍
            requestAnimationFrame(() => {
                container.innerHTML = ''; 
                newGridMap.forEach(tile => container.appendChild(tile));
            });
        }

        function move(dir) {
            let moved = false;
            let prevGrid = JSON.stringify(grid);

            // 簡化移動邏輯並保持物件結構
            const rotate = (m) => m[0].map((x, i) => m.map(x => x[i]).reverse());
            if(dir === 'up') grid = rotate(rotate(rotate(grid)));
            if(dir === 'right') grid = rotate(rotate(grid));
            if(dir === 'down') grid = rotate(grid);

            for(let r=0; r<GRID_SIZE; r++) {
                let row = grid[r].filter(v => v);
                for(let i=0; i<row.length-1; i++) {
                    if(row[i].value === row[i+1].value) {
                        row[i] = { value: row[i].value * 2, isNew: false };
                        score += row[i].value;
                        row.splice(i+1, 1);
                        moved = true;
                    }
                }
                while(row.length < GRID_SIZE) row.push(0);
                grid[r] = row;
            }

            if(dir === 'up') grid = rotate(grid);
            if(dir === 'right') grid = rotate(rotate(grid));
            if(dir === 'down') grid = rotate(rotate(rotate(grid)));

            if(prevGrid !== JSON.stringify(grid)) {
                addTile();
                scoreDisplay.textContent = score;
                render();
            }
        }

        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            let diffX = e.changedTouches[0].clientX - touchStartX;
            let diffY = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 20) move(diffX > 0 ? 'right' : 'left');
            } else {
                if (Math.abs(diffY) > 20) move(diffY > 0 ? 'down' : 'up');
            }
        }, {passive: true});

        window.addEventListener('keydown', e => {
            if(e.key.includes('Arrow')) move(e.key.replace('Arrow','').toLowerCase());
        });

        init();
    </script>
</body>
</html>
