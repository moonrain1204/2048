<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2K48 Pro v0.4</title>
    <style>
        :root {
            --bg-color: #bbada0;
            --tile-bg: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background-color: #faf8ef;
            font-family: "Clear Sans", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        /* 標題與分數區 */
        .header {
            width: 92%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .title-container { display: flex; flex-direction: column; }
        .version-tag { font-size: 10px; color: var(--text-dark); font-weight: 800; opacity: 0.6; }
        h1 { color: var(--text-dark); margin: 0; font-size: 48px; line-height: 0.9; }

        .scores-wrapper { display: flex; gap: 5px; }
        .score-box {
            background: var(--bg-color);
            padding: 5px 15px;
            border-radius: 6px;
            color: white;
            text-align: center;
            min-width: 60px;
        }
        .score-label { font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .score-value { font-size: 20px; font-weight: 800; display: block; }

        /* 按鈕區 */
        .controls {
            width: 92%;
            max-width: 450px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        /* 遊戲盤面 */
        .game-container {
            width: 92vw;
            height: 92vw;
            max-width: 450px;
            max-height: 450px;
            background-color: var(--bg-color);
            border-radius: 6px;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
            width: 100%; height: 100%;
        }
        .grid-cell { background: var(--tile-bg); border-radius: 4px; }
        .tile-container { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; }

        .tile {
            position: absolute;
            width: calc((100% - 32px) / 5);
            height: calc((100% - 32px) / 5);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            transition: transform 100ms ease-out, background-color 100ms ease;
            will-change: transform;
            z-index: 10;
        }

        /* 數字字體大小與動畫 */
        .tile-2, .tile-4, .tile-8 { font-size: 34px; }
        .tile-16, .tile-32, .tile-64 { font-size: 30px; }
        .tile-128, .tile-256, .tile-512 { font-size: 24px; }
        .tile-1024, .tile-2048, .tile-4096 { font-size: 18px; }

        .tile-new { animation: appear 150ms ease-out forwards; }
        @keyframes appear { 
            0% { opacity: 0; transform: var(--target-pos) scale(0); } 
            100% { opacity: 1; transform: var(--target-pos) scale(1); } 
        }

        /* 顏色主題優化 - 修正顏色相近問題 */
        .tile-2 { background: #eee4da; color: var(--text-dark); }
        .tile-4 { background: #ede0c8; color: var(--text-dark); }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        /* 128以上開始使用鮮明色系區分 */
        .tile-128 { background: #edcf72; color: white; } /* 黃 */
        .tile-256 { background: #61d9ed; color: white; } /* 淺藍 */
        .tile-512 { background: #9b59b6; color: white; } /* 紫色 */
        .tile-1024 { background: #2ecc71; color: white; } /* 綠色 */
        .tile-2048 { background: #34495e; color: white; } /* 深藍灰 */
        .tile-4096 { background: #e74c3c; color: white; } /* 鮮紅 */
        .tile-super { background: #000000; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-container">
            <span class="version-tag">VERSION 0.4 PRO</span>
            <h1>2K48</h1>
        </div>
        <div class="scores-wrapper">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div id="score" class="score-value">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div id="best-score" class="score-value">0</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="undo()">Undo</button>
        <button class="btn" onclick="resetGame()">New Game</button>
    </div>

    <div class="game-container">
        <div class="grid-container" id="grid-bg"></div>
        <div class="tile-container" id="tile-container"></div>
    </div>

    <script>
        const GRID_SIZE = 5;
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('2k48_best_5x5') || 0;
        let nextId = 0;
        let history = null; // 儲存上一步狀態

        const container = document.getElementById('tile-container');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best-score');

        function init() {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
            document.getElementById('grid-bg').innerHTML = '<div class="grid-cell"></div>'.repeat(25);
            bestDisplay.textContent = bestScore;
            addTile(); addTile();
            render();
        }

        function saveHistory() {
            // 深拷貝當前狀態
            history = {
                grid: JSON.parse(JSON.stringify(grid)),
                score: score
            };
        }

        function undo() {
            if (history) {
                grid = JSON.parse(JSON.stringify(history.grid));
                score = history.score;
                history = null; // 只能撤回一次
                scoreDisplay.textContent = score;
                render();
            } else {
                alert("無法再撤回了！");
            }
        }

        function resetGame() {
            if(confirm("確定要重開新局嗎？")) {
                score = 0;
                history = null;
                scoreDisplay.textContent = 0;
                init();
            }
        }

        function getPos(r, c) {
            return `translate(calc(${c} * 100% + ${c * 8}px), calc(${r} * 100% + ${r * 8}px))`;
        }

        function addTile() {
            let empty = [];
            for(let r=0; r<GRID_SIZE; r++)
                for(let c=0; c<GRID_SIZE; c++)
                    if(!grid[r][c]) empty.push({r,c});
            if(empty.length) {
                let {r,c} = empty[Math.floor(Math.random()*empty.length)];
                grid[r][c] = { value: Math.random() < 0.9 ? 2 : 4, id: nextId++, isNew: true };
            }
        }

        function render() {
            const activeIds = new Set();
            grid.forEach((row, r) => {
                row.forEach((cell, c) => {
                    if (cell) {
                        activeIds.add(cell.id);
                        let element = document.getElementById(`tile-${cell.id}`);
                        const pos = getPos(r, c);
                        
                        if (!element) {
                            element = document.createElement('div');
                            element.id = `tile-${cell.id}`;
                            element.style.transform = pos;
                            element.style.setProperty('--target-pos', pos);
                            element.className = 'tile tile-new';
                            container.appendChild(element);
                        }
                        
                        element.textContent = cell.value;
                        element.className = `tile tile-${cell.value > 4096 ? 'super' : cell.value} ${cell.isNew ? 'tile-new' : ''}`;
                        element.style.transform = pos;
                        element.style.setProperty('--target-pos', pos);
                        cell.isNew = false;
                    }
                });
            });

            container.querySelectorAll('.tile').forEach(el => {
                if (!activeIds.has(parseInt(el.id.replace('tile-', '')))) {
                    container.removeChild(el);
                }
            });

            // 更新最高分
            if (score > bestScore) {
                bestScore = score;
                bestDisplay.textContent = bestScore;
                localStorage.setItem('2k48_best_5x5', bestScore);
            }
        }

        function move(dir) {
            let prevGridStr = JSON.stringify(grid);
            saveHistory(); // 移動前先備份

            const rotate = (m) => m[0].map((x, i) => m.map(x => x[i]).reverse());
            if(dir === 'up') grid = rotate(rotate(rotate(grid)));
            if(dir === 'right') grid = rotate(rotate(grid));
            if(dir === 'down') grid = rotate(rotate(grid));

            let movedInLoop = false;
            for(let r=0; r<GRID_SIZE; r++) {
                let row = grid[r].filter(v => v !== null);
                for(let i=0; i<row.length-1; i++) {
                    if(row[i].value === row[i+1].value) {
                        row[i] = { value: row[i].value * 2, id: row[i].id, isNew: false };
                        score += row[i].value;
                        row.splice(i+1, 1);
                        movedInLoop = true;
                    }
                }
                while(row.length < GRID_SIZE) row.push(null);
                grid[r] = row;
            }

            if(dir === 'up') grid = rotate(grid);
            if(dir === 'right') grid = rotate(rotate(grid));
            if(dir === 'down') grid = rotate(rotate(rotate(grid)));

            if(prevGridStr !== JSON.stringify(grid)) {
                addTile();
                scoreDisplay.textContent = score;
                render();
            } else {
                history = null; // 如果沒動，清除這次的歷史紀錄
            }
        }

        // 手勢偵測
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            let diffX = e.changedTouches[0].clientX - touchStartX;
            let diffY = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 20) move(diffX > 0 ? 'right' : 'left');
            } else {
                if (Math.abs(diffY) > 20) move(diffY > 0 ? 'down' : 'up');
            }
        }, {passive: true});

        window.addEventListener('keydown', e => {
            if(e.key.includes('Arrow')) move(e.key.replace('Arrow','').toLowerCase());
        });

        init();
    </script>
</body>
</html>
