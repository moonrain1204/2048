<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2K48 Mobile v0.3</title>
    <style>
        :root {
            --bg-color: #bbada0;
            --tile-bg: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background-color: #faf8ef;
            font-family: "Clear Sans", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            width: 90%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        .version-tag { font-size: 12px; color: var(--text-dark); font-weight: 800; }

        .score-container {
            background: var(--bg-color);
            padding: 8px 20px;
            border-radius: 6px;
            color: white;
            text-align: center;
        }

        .score-value { font-size: 24px; font-weight: 800; display: block; }

        .game-container {
            width: 92vw;
            height: 92vw;
            max-width: 450px;
            max-height: 450px;
            background-color: var(--bg-color);
            border-radius: 6px;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            height: 100%;
        }

        .grid-cell { background: var(--tile-bg); border-radius: 4px; }

        .tile-container {
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
        }

        .tile {
            position: absolute;
            width: calc((100% - 32px) / 5);
            height: calc((100% - 32px) / 5);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            /* 關鍵：使用 transform 並開啟硬體加速 */
            transition: transform 110ms ease-out, background-color 100ms ease;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            will-change: transform;
            z-index: 10;
        }

        /* 加粗加大字體 */
        .tile-2, .tile-4, .tile-8 { font-size: 34px; }
        .tile-16, .tile-32, .tile-64 { font-size: 30px; }
        .tile-128, .tile-256, .tile-512 { font-size: 24px; }
        .tile-1024, .tile-2048 { font-size: 20px; }

        .tile-new { animation: appear 150ms ease-out forwards; }

        @keyframes appear { 
            0% { opacity: 0; transform: var(--target-pos) scale(0); } 
            100% { opacity: 1; transform: var(--target-pos) scale(1); } 
        }

        /* 顏色定義 */
        .tile-2 { background: #eee4da; color: var(--text-dark); }
        .tile-4 { background: #ede0c8; color: var(--text-dark); }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; }
        .tile-256 { background: #edcc61; color: white; }
        .tile-512 { background: #edc850; color: white; }
        .tile-1024 { background: #edc53f; color: white; }
        .tile-2048 { background: #edc22e; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <span class="version-tag">VERSION 0.3 (Zero-Flicker)</span>
            <h1 style="color: var(--text-dark); margin: 0; line-height: 1;">2K48</h1>
        </div>
        <div class="score-container">
            <div style="font-size: 12px; font-weight: 800;">SCORE</div>
            <div id="score" class="score-value">0</div>
        </div>
    </div>

    <div class="game-container">
        <div class="grid-container" id="grid-bg"></div>
        <div class="tile-container" id="tile-container"></div>
    </div>

    <script>
        const GRID_SIZE = 5;
        let grid = [];
        let score = 0;
        let nextId = 0;
        const container = document.getElementById('tile-container');
        const scoreDisplay = document.getElementById('score');

        function init() {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
            document.getElementById('grid-bg').innerHTML = '<div class="grid-cell"></div>'.repeat(25);
            addTile(); addTile();
            render();
        }

        function getPos(r, c) {
            return `translate(calc(${c} * 100% + ${c * 8}px), calc(${r} * 100% + ${r * 8}px))`;
        }

        function addTile() {
            let empty = [];
            for(let r=0; r<GRID_SIZE; r++)
                for(let c=0; c<GRID_SIZE; c++)
                    if(!grid[r][c]) empty.push({r,c});
            if(empty.length) {
                let {r,c} = empty[Math.floor(Math.random()*empty.length)];
                grid[r][c] = { value: Math.random() < 0.9 ? 2 : 4, id: nextId++, isNew: true };
            }
        }

        function render() {
            const activeIds = new Set();
            grid.forEach((row, r) => {
                row.forEach((cell, c) => {
                    if (cell) {
                        activeIds.add(cell.id);
                        let element = document.getElementById(`tile-${cell.id}`);
                        const pos = getPos(r, c);
                        
                        if (!element) {
                            element = document.createElement('div');
                            element.id = `tile-${cell.id}`;
                            // 關鍵：在加入 DOM 前直接設定座標與 CSS 變數，防止跳轉
                            element.style.transform = pos;
                            element.style.setProperty('--target-pos', pos);
                            element.className = 'tile tile-new';
                            container.appendChild(element);
                        }
                        
                        element.textContent = cell.value;
                        element.className = `tile tile-${cell.value > 2048 ? 'super' : cell.value} ${cell.isNew ? 'tile-new' : ''}`;
                        element.style.transform = pos;
                        element.style.setProperty('--target-pos', pos);
                        cell.isNew = false;
                    }
                });
            });

            // 移除不再存在的方塊
            container.querySelectorAll('.tile').forEach(el => {
                if (!activeIds.has(parseInt(el.id.replace('tile-', '')))) {
                    container.removeChild(el);
                }
            });
        }

        function move(dir) {
            let prevGrid = JSON.stringify(grid);
            const rotate = (m) => m[0].map((x, i) => m.map(x => x[i]).reverse());
            
            if(dir === 'up') grid = rotate(rotate(rotate(grid)));
            if(dir === 'right') grid = rotate(rotate(grid));
            if(dir === 'down') grid = rotate(grid);

            for(let r=0; r<GRID_SIZE; r++) {
                let row = grid[r].filter(v => v !== null);
                for(let i=0; i<row.length-1; i++) {
                    if(row[i].value === row[i+1].value) {
                        row[i] = { value: row[i].value * 2, id: row[i].id, isNew: false };
                        score += row[i].value;
                        row.splice(i+1, 1);
                    }
                }
                while(row.length < GRID_SIZE) row.push(null);
                grid[r] = row;
            }

            if(dir === 'up') grid = rotate(grid);
            if(dir === 'right') grid = rotate(rotate(grid));
            if(dir === 'down') grid = rotate(rotate(rotate(grid)));

            if(prevGrid !== JSON.stringify(grid)) {
                addTile();
                scoreDisplay.textContent = score;
                render();
            }
        }

        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            let diffX = e.changedTouches[0].clientX - touchStartX;
            let diffY = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 20) move(diffX > 0 ? 'right' : 'left');
            } else {
                if (Math.abs(diffY) > 20) move(diffY > 0 ? 'down' : 'up');
            }
        }, {passive: true});

        window.addEventListener('keydown', e => {
            if(e.key.includes('Arrow')) move(e.key.replace('Arrow','').toLowerCase());
        });

        init();
    </script>
</body>
</html>
